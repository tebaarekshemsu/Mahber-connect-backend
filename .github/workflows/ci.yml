name: CI

# Trigger on pushes to main/develop and on all pull requests
on:
  push:
    branches:
      - main
      - develop
  pull_request:

env:
  NODE_VERSION: '20'

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # Job 2: Unit tests + property-based tests
  # ---------------------------------------------------------------------------
  test:
    name: Unit & Property Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit and property-based tests with coverage
        run: npm run test:cov
        env:
          # Minimal env vars required by ConfigModule validation at test time
          DATABASE_URL: postgresql://postgres:password@localhost:5432/mahberconnect_test?schema=public
          JWT_SECRET: ci-test-jwt-secret
          CHAPA_SECRET_KEY: ci-test-chapa-key
          FIREBASE_PROJECT_ID: ci-test-project
          FIREBASE_PRIVATE_KEY: ci-test-private-key
          FIREBASE_CLIENT_EMAIL: ci-test@ci-test.iam.gserviceaccount.com
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NODE_ENV: test

      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unit
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 3: E2E / Integration tests
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint

    # No real database or Redis needed — external services are mocked in the
    # TestAppHelper.  If real infrastructure is ever required, uncomment the
    # services block below and update the DATABASE_URL accordingly.
    #
    # services:
    #   postgres:
    #     image: postgres:15-alpine
    #     env:
    #       POSTGRES_DB: mahberconnect_test
    #       POSTGRES_USER: postgres
    #       POSTGRES_PASSWORD: password
    #     ports:
    #       - 5432:5432
    #     options: >-
    #       --health-cmd pg_isready
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5
    #   redis:
    #     image: redis:7-alpine
    #     ports:
    #       - 6379:6379
    #     options: >-
    #       --health-cmd "redis-cli ping"
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/mahberconnect_test?schema=public
          JWT_SECRET: ci-test-jwt-secret
          CHAPA_SECRET_KEY: ci-test-chapa-key
          FIREBASE_PROJECT_ID: ci-test-project
          FIREBASE_PRIVATE_KEY: ci-test-private-key
          FIREBASE_CLIENT_EMAIL: ci-test@ci-test.iam.gserviceaccount.com
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NODE_ENV: test

      - name: Upload E2E coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: e2e
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
